name: Update OGD Data

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: Aktuelle Daten abrufen
        run: python fetch_data.py

      - name: Änderungen committen
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add ogd_packages.csv ogd_resources.csv
          git commit -m "Update: $(date +'%Y-%m-%d')" || echo "Keine Änderungen"
          git push

      - name: Git-History rekonstruieren
        run: python extract_git_history.py

      - name: Deploy-Verzeichnis vorbereiten
        run: |
          mkdir -p _deploy
          cp index.html _deploy/
          cp ogd_packages_history.csv _deploy/
          cp ogd_resources_history.csv _deploy/
          cp -r vendor _deploy/

      - name: GitHub Pages deployen
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _deploy
